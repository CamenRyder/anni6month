<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Happy Anniversary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', serif;
    }

    #splash-layer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      background: #000;
      color: #fff;
      transition: opacity 0.8s ease;
    }

    #splash-layer.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash-box {
      width: min(260px, calc(100vw - 48px));
      text-align: center;
    }

    #splash-message,
    #splash-text {
      display: block;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    #splash-message {
      min-height: 2.4em;
      margin-bottom: 0.8rem;
      opacity: 0;
      line-height: 1.35;
      transition: opacity 0.4s ease;
    }

    #splash-message.visible {
      opacity: 1;
    }

    #splash-track {
      width: 100%;
      height: 2px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.22);
    }

    #splash-progress {
      width: 0%;
      height: 100%;
      background: #fff;
      transition: width 0.2s ease;
    }

    #splash-text {
      margin-top: 0.8rem;
    }

    /* ── Background slideshow ── */
    #bg-layer {
      position: fixed;
      inset: 0;
      transition: opacity 1.8s ease;
    }
    #bg-layer.fade-out { opacity: 0; pointer-events: none; }

    .slide-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 0.08s ease;
    }
    .slide-img.active { opacity: 1; }

    /* ── Counter layer ── */
    #counter-layer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 1.8s ease;
    }
    #counter-layer.fade-out { opacity: 0; pointer-events: none; }

    #counter-wrap {
      text-align: center;
      user-select: none;
      padding: 1.5rem 2.5rem 1.2rem;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #counter-num {
      display: block;
      font-size: clamp(5rem, 26vw, 13rem);
      font-weight: bold;
      color: #fff;
      line-height: 1;
      transition: transform 0.06s ease;
    }

    #counter-label {
      display: block;
      font-size: clamp(1.4rem, 7vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #fff;
      margin-top: 0.15em;
    }

    /* ── Message layer ── */
    #message-layer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 18px;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 1.8s ease 0.3s;
      background: #000;
      overflow: hidden;
    }
    #message-layer.visible { opacity: 1; pointer-events: auto; }

    #message-box {
      max-width: 520px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    #message-text {
      font-size: clamp(0.76rem, 3.04vw, 0.96rem);
      line-height: 1.95;
      color: #fff;
      white-space: pre-line;
      word-break: break-word;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    #message-text.fade-out { opacity: 0; }

    #message-text.is-title { text-align: center; }
    #message-text.is-body { text-align: left; }
    #message-text.is-finale {
      font-size: clamp(3.04rem, 12.16vw, 3.84rem);
      text-align: center;
      line-height: 1.2;
    }
    #message-text.is-time {
      font-family: 'Times New Roman', Georgia, serif;
      font-size: clamp(0.968rem, 4.4vw, 1.496rem);
      line-height: 1.6;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .time-title {
      display: block;
      margin-bottom: 0.4rem;
      font-size: clamp(0.88rem, 3.872vw, 1.276rem);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .time-value {
      display: block;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .mode-actions {
      display: flex;
      justify-content: center;
      gap: 0.65rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .mode-button {
      min-width: 4.5rem;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.34);
      color: #fff;
      cursor: pointer;
      font-family: 'Times New Roman', Georgia, serif;
      font-size: 0.78rem;
      padding: 0.42rem 0.9rem;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .mode-button:active { transform: scale(0.96); }
    .mode-button:hover { background: rgba(255, 255, 255, 0.14); }

    #photo-grid-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
      touch-action: none;
      filter: saturate(1) brightness(0.82);
      will-change: opacity, filter;
      transition: opacity 0.8s ease, filter 0.8s ease;
    }

    #photo-grid-layer.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #message-layer.photo-mode #photo-grid-layer.visible {
      filter: saturate(1.06) brightness(0.86);
    }

    .honeycomb-item {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--item-size);
      height: var(--item-size);
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 0.7rem 1.8rem rgba(0, 0, 0, 0.34);
      cursor: pointer;
      will-change: transform, opacity;
      transform: translate3d(-50%, -50%, 0);
      backface-visibility: hidden;
    }

    .honeycomb-item img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scale(1.03);
      pointer-events: none;
    }

    #message-layer.photo-background .floating-bg-item {
      display: none;
    }

    .photo-focus-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0);
      -webkit-backdrop-filter: blur(0);
      transition: background 0.38s ease, backdrop-filter 0.38s ease;
    }

    .photo-focus-backdrop.visible {
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .photo-focus-image {
      position: fixed;
      z-index: 51;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 1.4rem 3.2rem rgba(0, 0, 0, 0.48);
      transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1), border-radius 0.42s ease;
      will-change: transform;
    }

    .floating-bg-item {
      position: absolute;
      bottom: -3rem;
      left: var(--x);
      z-index: 1;
      pointer-events: none;
      user-select: none;
      animation: float-up var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .floating-bg-item.emoji {
      font-size: var(--size);
      opacity: 0.62;
    }

    .floating-bg-item.text {
      color: rgba(255, 255, 255, 0.72);
      font-family: 'Times New Roman', Georgia, serif;
      font-size: var(--size);
      font-style: italic;
      letter-spacing: 0.04em;
      opacity: 0.68;
      white-space: nowrap;
    }

    .floating-bg-item.bubble {
      width: var(--size);
      height: var(--size);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      background: radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.12) 42%, rgba(255, 255, 255, 0.02) 70%);
      box-shadow: inset -0.12rem -0.16rem 0.35rem rgba(255, 255, 255, 0.12);
      opacity: 0.5;
    }

    @keyframes float-up {
      0% {
        transform: translate3d(0, 0, 0) scale(0.9) rotate(0deg);
        opacity: 0;
      }
      12% { opacity: 0.62; }
      50% { transform: translate3d(var(--drift), -55vh, 0) scale(1) rotate(14deg); }
      100% {
        transform: translate3d(calc(var(--drift) * -0.45), -112vh, 0) scale(1.08) rotate(32deg);
        opacity: 0;
      }
    }

  </style>
</head>
<body>

  <div id="splash-layer">
    <div id="splash-box">
      <span id="splash-message">Loading hơi lâu xí</span>
      <div id="splash-track">
        <div id="splash-progress"></div>
      </div>
      <span id="splash-text">Loading 0%</span>
    </div>
  </div>

  <div id="bg-layer"></div>

  <div id="counter-layer">
    <div id="counter-wrap">
      <span id="counter-num">0</span>
      <span id="counter-label">Day</span>
    </div>
  </div>

  <div id="message-layer">
    <div id="photo-grid-layer"></div>
    <div id="message-box">
      <div id="message-text"></div>
    </div>
  </div>

  <script>
    /* ── Slideshow ── */
    const IMAGES = Array.from({ length: 35 }, (_, i) => `hinhanh/hinhanh_${String(i + 1).padStart(2, '0')}.JPG`);
    const splashLayer = document.getElementById('splash-layer');
    const splashMessage = document.getElementById('splash-message');
    const splashText = document.getElementById('splash-text');
    const splashProgress = document.getElementById('splash-progress');
    const bgLayer = document.getElementById('bg-layer');
    const SPLASH_MESSAGES = [
      'Loading hơi lâu xí',
      'Beo chờ chút nhoaâ',
      'Beo biết mìh simp em ntn hông?',
      'Kiểu con ong là mìh',
      'Beo là mật hoa...',
      'Bông hoa của mình<3',
      'Quyết định là iu beo có hối hận ko',
      'koo. rất hài lòng và xứng đáng',
      'kem nhãn ngon ghê',
      'mí cái áo beo tặng tớ thích dữ lắm',
      'ê load lâu vữuu',
      'ráng chờ nhoaâ',
      'tớ thích ăn kem',
      'vì trong kem có emm beo',
    ];
    const SPLASH_FALLBACK_MESSAGE = 'có thể có trục chặc, cậu nhắn mìh nha';
    const SPLASH_MESSAGE_DURATION = 3000;
    const SPLASH_MESSAGE_FADE_OUT_AT = 2600;
    let splashMessageTimeout = null;
    let splashFadeTimeout = null;
    let splashMessageDone = false;

    let slides = [];
    let currentSlide = 0;

    /* ── Counter 0 → 180 in 12 s ── */
    const counterNumEl  = document.getElementById('counter-num');
    const counterLayer  = document.getElementById('counter-layer');
    const messageLayer  = document.getElementById('message-layer');
    const messageText   = document.getElementById('message-text');
    const photoGridLayer = document.getElementById('photo-grid-layer');
    let finalBackgroundStarted = false;
    let finalTimeInterval = null;
    let finalScene = 'time';
    let photoGridBuilt = false;
    let photoAnimationStarted = false;
    let photoFocused = false;
    const honeycombItems = [];
    const honeycombState = {
      x: 0,
      y: 0,
      targetX: 0,
      targetY: 0,
      vx: 0,
      vy: 0,
      isDragging: false,
      lastX: 0,
      lastY: 0,
      lastTime: 0,
      moved: false,
    };
    const honeycombConfig = {
      itemSize: 82,
      gap: 16,
      maxScale: 1.34,
      minScale: 0.66,
      focusRadius: 230,
      inertiaFriction: 0.92,
      springStrength: 0.18,
    };

    const MESSAGE =
`Happy Anniversary 🎉

Mình rất biết ơn và trân trọng vì chúng ta đã tiến đến cột mốc hôm nay 23/11/25 - 23/5/26. Quá nhiều câu chuyện, quá nhiều niềm vui và quá nhiều cái dễ thương đã xảy đến với riêng mình trong thời gian 6 tháng qua.

Quá nhiều cái ôm, quá nhiều mimi, quá nhiều những km cùng với nhau và quá nhiều điều thú vị cùng nhau khám phá ra...

Quá nhiều nên mình yêu Beo nhiều quá ❤️

Cảm ơn Beo đã đồng hành cùng mình 6 tháng qua. Cậu tiếp tục như thế đến khi về chung 1 nhà luôn he =)), 

I love Beo ❤️`;

    const MESSAGE_LINES = MESSAGE.split(/\n\s*\n/);
    const LOVE_START_DATE = new Date(2025, 10, 23, 0, 0, 0);

    const COUNT_DURATION = 12000;
    const COUNT_TARGET   = 180;
    const SLIDE_EASE_START = 179;
    let   startTime      = null;
    let   lastDisplayed  = -1;

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function inverseEaseOutCubic(t) { return 1 - Math.pow(1 - t, 1 / 3); }

    function getSlideProgress(progress) {
      const easeStartRatio = SLIDE_EASE_START / COUNT_TARGET;
      const easeStartTime  = inverseEaseOutCubic(easeStartRatio);

      if (progress < easeStartTime) {
        return (progress / easeStartTime) * easeStartRatio;
      }

      const remainingProgress = (progress - easeStartTime) / (1 - easeStartTime);
      return easeStartRatio + easeOutCubic(remainingProgress) * (1 - easeStartRatio);
    }

    function showSlide(index) {
      if (index === currentSlide) return;
      slides[currentSlide].classList.remove('active');
      slides[index].classList.add('active');
      currentSlide = index;
    }

    function updateSplash(loadedCount) {
      const percent = Math.round((loadedCount / IMAGES.length) * 100);
      splashText.textContent = `Loading ${percent}%`;
      splashProgress.style.width = `${percent}%`;
    }

    function stopSplashMessages() {
      splashMessageDone = true;
      clearTimeout(splashMessageTimeout);
      clearTimeout(splashFadeTimeout);
    }

    function showSplashMessage(index = 0) {
      if (splashMessageDone) return;

      const message = SPLASH_MESSAGES[index] || SPLASH_FALLBACK_MESSAGE;
      const hasNextMessage = index < SPLASH_MESSAGES.length;
      splashMessage.textContent = message;
      splashMessage.classList.add('visible');

      if (hasNextMessage) {
        splashFadeTimeout = setTimeout(() => {
          splashMessage.classList.remove('visible');
        }, SPLASH_MESSAGE_FADE_OUT_AT);

        splashMessageTimeout = setTimeout(() => {
          showSplashMessage(index + 1);
        }, SPLASH_MESSAGE_DURATION);
      }
    }

    function preloadImages() {
      let loadedCount = 0;
      updateSplash(loadedCount);
      showSplashMessage();

      return Promise.all(IMAGES.map((src) => new Promise((resolve) => {
        const img = new Image();
        img.onload = img.onerror = () => {
          loadedCount += 1;
          updateSplash(loadedCount);
          resolve(src);
        };
        img.src = src;
      })));
    }

    function buildSlides() {
      slides = IMAGES.map((src, i) => {
        const img = document.createElement('img');
        img.src       = src;
        img.className = 'slide-img' + (i === 0 ? ' active' : '');
        img.alt       = '';
        bgLayer.appendChild(img);
        return img;
      });
    }

    function startExperience() {
      buildSlides();
      stopSplashMessages();
      splashLayer.classList.add('hidden');
      setTimeout(() => {
        splashLayer.remove();
      }, 900);
      requestAnimationFrame(animateCounter);
    }

    function typeText(text, index = 0, onComplete = () => {}) {
      messageText.textContent = text.slice(0, index);

      if (index < text.length) {
        const char = text[index];
        const delay = char === '\n' ? 260 : 42;
        setTimeout(() => typeText(text, index + 1, onComplete), delay);
      } else {
        onComplete();
      }
    }

    function formatElapsedTime(fromDate, toDate) {
      const totalSeconds = Math.max(0, Math.floor((toDate - fromDate) / 1000));
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      return `${String(days).padStart(2, '0')} ngày, ${String(hours).padStart(2, '0')} giờ : ${String(minutes).padStart(2, '0')} phút : ${String(seconds).padStart(2, '0')} giây`;
    }

    function startFinalBackground() {
      if (finalBackgroundStarted) return;
      finalBackgroundStarted = true;

      const icons = ['❤️', '💕', '🌸', '🌷'];
      const floatingTexts = ['iuu beo', 'moa', 'hun ah', 'nhớ beo', 'tí gặp ko?', 'nah luv u'];
      const textSizes = ['8px', '9px', '10px'];

      for (let i = 0; i < 56; i++) {
        const item = document.createElement('span');
        const itemType = i % 4 === 0 ? 'bubble' : i % 4 === 1 ? 'text' : 'emoji';
        item.className = `floating-bg-item ${itemType}`;

        if (itemType === 'emoji') {
          item.textContent = icons[Math.floor(Math.random() * icons.length)];
        } else if (itemType === 'text') {
          item.textContent = floatingTexts[Math.floor(Math.random() * floatingTexts.length)];
        }

        item.style.setProperty('--x', `${Math.random() * 100}%`);
        item.style.setProperty('--size', itemType === 'bubble'
          ? `${0.45 + Math.random() * 1.15}rem`
          : itemType === 'text'
            ? textSizes[Math.floor(Math.random() * textSizes.length)]
            : `${0.8 + Math.random() * 1.1}rem`);
        item.style.setProperty('--duration', `${8 + Math.random() * 9}s`);
        item.style.setProperty('--delay', `${-Math.random() * 12}s`);
        item.style.setProperty('--drift', `${(Math.random() * 6 - 3).toFixed(2)}rem`);
        messageLayer.appendChild(item);
      }
    }

    // 1. Khởi tạo dữ liệu 36 ảnh.
    function getRomanticImages() {
      return Array.from({ length: 36 }, (_, i) => IMAGES[i % IMAGES.length]);
    }

    // 2. Render honeycomb grid.
    function buildPhotoGrid() {
      if (photoGridBuilt) return;
      photoGridBuilt = true;

      const images = getRomanticImages();
      const stepX = honeycombConfig.itemSize + honeycombConfig.gap;
      const stepY = (honeycombConfig.itemSize + honeycombConfig.gap) * 0.84;

      images.forEach((src, index) => {
        const row = Math.floor(index / 6);
        const col = index % 6;
        const x = (col - 2.5) * stepX + (row % 2 ? stepX / 2 : 0);
        const y = (row - 2.5) * stepY;
        const item = document.createElement('button');
        const img = document.createElement('img');

        item.className = 'honeycomb-item';
        item.type = 'button';
        item.style.setProperty('--item-size', `${honeycombConfig.itemSize}px`);
        img.src = src;
        img.alt = '';
        item.appendChild(img);
        item.addEventListener('click', () => {
          if (!honeycombState.moved) zoomPhotoIn(item, src);
        });

        photoGridLayer.appendChild(item);
        honeycombItems.push({ el: item, x, y });
      });
    }

    // 4. Tính scale dựa trên khoảng cách ảnh tới tâm viewport.
    function getItemScale(screenX, screenY) {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      const distance = Math.hypot(screenX - centerX, screenY - centerY);
      const focus = Math.max(0, 1 - distance / honeycombConfig.focusRadius);
      return honeycombConfig.minScale + (honeycombConfig.maxScale - honeycombConfig.minScale) * focus;
    }

    function renderHoneycomb() {
      if (honeycombState.isDragging) {
        honeycombState.x += (honeycombState.targetX - honeycombState.x) * honeycombConfig.springStrength;
        honeycombState.y += (honeycombState.targetY - honeycombState.y) * honeycombConfig.springStrength;
      } else {
        honeycombState.targetX += honeycombState.vx;
        honeycombState.targetY += honeycombState.vy;
        honeycombState.vx *= honeycombConfig.inertiaFriction;
        honeycombState.vy *= honeycombConfig.inertiaFriction;
        honeycombState.x += (honeycombState.targetX - honeycombState.x) * honeycombConfig.springStrength;
        honeycombState.y += (honeycombState.targetY - honeycombState.y) * honeycombConfig.springStrength;
      }

      honeycombItems.forEach((item) => {
        const screenX = window.innerWidth / 2 + item.x + honeycombState.x;
        const screenY = window.innerHeight / 2 + item.y + honeycombState.y;
        const scale = getItemScale(screenX, screenY);
        const depth = 1 + (scale - honeycombConfig.minScale) * 0.12;
        item.el.style.transform = `translate3d(calc(-50% + ${item.x + honeycombState.x}px), calc(-50% + ${item.y + honeycombState.y}px), 0) scale(${scale * depth})`;
        item.el.style.opacity = String(0.5 + scale * 0.38);
      });

      requestAnimationFrame(renderHoneycomb);
    }

    function startHoneycombAnimation() {
      if (photoAnimationStarted) return;
      photoAnimationStarted = true;
      requestAnimationFrame(renderHoneycomb);
    }

    // 3. Xử lý pan/drag bằng mouse và touch.
    function handleHoneycombPointerDown(event) {
      if (!photoGridLayer.classList.contains('visible') || photoFocused) return;
      honeycombState.isDragging = true;
      honeycombState.lastX = event.clientX;
      honeycombState.lastY = event.clientY;
      honeycombState.lastTime = performance.now();
      honeycombState.vx = 0;
      honeycombState.vy = 0;
      honeycombState.moved = false;
      photoGridLayer.setPointerCapture(event.pointerId);
    }

    function handleHoneycombPointerMove(event) {
      if (!honeycombState.isDragging) return;
      const now = performance.now();
      const dx = event.clientX - honeycombState.lastX;
      const dy = event.clientY - honeycombState.lastY;
      const dt = Math.max(16, now - honeycombState.lastTime);

      if (Math.hypot(dx, dy) > 2) honeycombState.moved = true;
      honeycombState.targetX += dx;
      honeycombState.targetY += dy;
      honeycombState.vx = dx / dt * 16;
      honeycombState.vy = dy / dt * 16;
      honeycombState.lastX = event.clientX;
      honeycombState.lastY = event.clientY;
      honeycombState.lastTime = now;
    }

    // 5. Inertia/momentum sau khi thả tay.
    function handleHoneycombPointerUp(event) {
      if (!honeycombState.isDragging) return;
      honeycombState.isDragging = false;
      photoGridLayer.releasePointerCapture(event.pointerId);
      setTimeout(() => {
        honeycombState.moved = false;
      }, 80);
    }

    // 6. Zoom ảnh lên full screen.
    function zoomPhotoIn(sourceEl, src) {
      if (photoFocused) return;
      photoFocused = true;
      const rect = sourceEl.getBoundingClientRect();
      const backdrop = document.createElement('div');
      const preview = document.createElement('img');
      const viewportPadding = 26;
      const maxHeight = window.innerHeight - viewportPadding * 2;
      const maxWidth = window.innerWidth - viewportPadding * 2;
      let targetHeight = Math.min(maxHeight, maxWidth * 4 / 3);
      let targetWidth = targetHeight * 3 / 4;

      if (targetWidth > maxWidth) {
        targetWidth = maxWidth;
        targetHeight = targetWidth * 4 / 3;
      }

      backdrop.className = 'photo-focus-backdrop';
      preview.className = 'photo-focus-image';
      preview.src = src;
      preview.alt = '';
      preview.style.width = `${rect.width}px`;
      preview.style.height = `${rect.height}px`;
      preview.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0)`;
      document.body.append(backdrop, preview);

      requestAnimationFrame(() => {
        backdrop.classList.add('visible');
        preview.style.width = `${targetWidth}px`;
        preview.style.height = `${targetHeight}px`;
        preview.style.borderRadius = '22px';
        preview.style.transform = `translate3d(${(window.innerWidth - targetWidth) / 2}px, ${(window.innerHeight - targetHeight) / 2}px, 0)`;
      });

      const close = () => zoomPhotoOut(sourceEl, backdrop, preview, close);
      backdrop.addEventListener('click', close);
      preview.addEventListener('click', close);
      window.addEventListener('wheel', close, { once: true });
    }

    // 7. Zoom out quay lại grid.
    function zoomPhotoOut(sourceEl, backdrop, preview, close) {
      const rect = sourceEl.getBoundingClientRect();
      backdrop.removeEventListener('click', close);
      preview.removeEventListener('click', close);
      backdrop.classList.remove('visible');
      preview.style.width = `${rect.width}px`;
      preview.style.height = `${rect.height}px`;
      preview.style.borderRadius = '50%';
      preview.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0)`;

      setTimeout(() => {
        backdrop.remove();
        preview.remove();
        photoFocused = false;
      }, 430);
    }

    function fadeToScene(renderScene) {
      messageText.classList.add('fade-out');
      setTimeout(() => {
        renderScene();
        requestAnimationFrame(() => {
          messageText.classList.remove('fade-out');
        });
      }, 800);
    }

    function renderTimeCounter() {
      finalScene = 'time';
      messageLayer.classList.remove('photo-mode', 'photo-background');
      photoGridLayer.classList.remove('visible');
      messageText.classList.remove('is-title', 'is-body', 'is-finale');
      messageText.classList.add('is-time');

      const updateTime = () => {
        if (finalScene !== 'time') return;
        messageText.innerHTML = `
          <span class="time-title">Yêu nhau bao lâu rùi?</span>
          <span class="time-value">${formatElapsedTime(LOVE_START_DATE, new Date())}</span>
          <span class="mode-actions">
            <button class="mode-button" type="button" data-action="timeline">Timeline</button>
            <button class="mode-button" type="button" data-action="photos">Romantic</button>
          </span>
        `;
      };

      updateTime();
      if (!finalTimeInterval) {
        finalTimeInterval = setInterval(updateTime, 1000);
      }
    }

    function renderTimelineScene() {
      finalScene = 'timeline';
      messageLayer.classList.remove('photo-mode', 'photo-background');
      photoGridLayer.classList.remove('visible');
      messageText.classList.remove('is-title', 'is-finale', 'is-time');
      messageText.classList.add('is-body');
      messageText.innerHTML = `
        <span class="time-title">Timeline lịch hẹn</span>
        <span class="time-value">Mình sẽ thêm timeline ở đây sau khi bạn cung cấp nội dung.</span>
        <span class="mode-actions">
          <button class="mode-button" type="button" data-action="back-time">Quay lại</button>
        </span>
      `;
    }

    function renderPhotoScene() {
      finalScene = 'photos';
      buildPhotoGrid();
      startHoneycombAnimation();
      messageLayer.classList.add('photo-background', 'photo-mode');
      photoGridLayer.classList.add('visible');
      messageText.classList.remove('is-title', 'is-body', 'is-finale');
      messageText.classList.add('is-time');
      messageText.innerHTML = `
        <span class="time-title">Kỷ niệm tụi mình</span>
        <span class="mode-actions">
          <button class="mode-button" type="button" data-action="back-time">Quay lại</button>
        </span>
      `;
    }

    function showRealtimeLoveCounter() {
      messageText.classList.remove('fade-out', 'is-title', 'is-body', 'is-finale');
      messageText.classList.add('is-time');
      startFinalBackground();
      renderTimeCounter();
    }

    messageText.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;

      const action = button.dataset.action;
      if (action === 'timeline') {
        fadeToScene(renderTimelineScene);
      } else if (action === 'photos') {
        fadeToScene(renderPhotoScene);
      } else if (action === 'back-time') {
        fadeToScene(renderTimeCounter);
      }
    });

    photoGridLayer.addEventListener('pointerdown', handleHoneycombPointerDown);
    photoGridLayer.addEventListener('pointermove', handleHoneycombPointerMove);
    photoGridLayer.addEventListener('pointerup', handleHoneycombPointerUp);
    photoGridLayer.addEventListener('pointercancel', handleHoneycombPointerUp);
    photoGridLayer.addEventListener('wheel', (event) => {
      if (!photoGridLayer.classList.contains('visible') || photoFocused) return;
      event.preventDefault();
      honeycombState.targetX -= event.deltaX;
      honeycombState.targetY -= event.deltaY;
    }, { passive: false });

    function showMessageLine(lineIndex = 0) {
      if (lineIndex >= MESSAGE_LINES.length) {
        showRealtimeLoveCounter();
        return;
      }

      messageText.classList.remove('fade-out', 'is-title', 'is-body', 'is-finale', 'is-time');
      messageText.classList.toggle('is-title', lineIndex === 0);
      messageText.classList.toggle('is-body', lineIndex !== 0 && lineIndex !== MESSAGE_LINES.length - 1);
      messageText.classList.toggle('is-finale', lineIndex === MESSAGE_LINES.length - 1);
      typeText(MESSAGE_LINES[lineIndex], 0, () => {
        setTimeout(() => {
          messageText.classList.add('fade-out');
          setTimeout(() => {
            messageText.textContent = '';
            showMessageLine(lineIndex + 1);
          }, 800);
        }, 3000);
      });
    }

    function animateCounter(timestamp) {
      if (!startTime) startTime = timestamp;
      const elapsed       = timestamp - startTime;
      const progress      = Math.min(elapsed / COUNT_DURATION, 1);
      const easedProgress = easeOutCubic(progress);
      const current       = Math.round(easedProgress * COUNT_TARGET);
      const slideProgress = getSlideProgress(progress);
      const slideIndex    = Math.min(Math.floor(slideProgress * slides.length), slides.length - 1);

      showSlide(slideIndex);

      if (current !== lastDisplayed) {
        counterNumEl.textContent     = current;
        counterNumEl.style.transform = 'scale(1.08)';
        setTimeout(() => { counterNumEl.style.transform = 'scale(1)'; }, 60);
        lastDisplayed = current;
      }

      if (progress < 1) {
        requestAnimationFrame(animateCounter);
      } else {
        bgLayer.classList.add('fade-out');
        counterLayer.classList.add('fade-out');
        setTimeout(() => {
          messageLayer.classList.add('visible');
          showMessageLine();
        }, 2000);
      }
    }

    preloadImages().then(startExperience);
  </script>
</body>
</html>
