<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Happy Anniversary</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Georgia', serif;
    }

    /* ── Background slideshow ── */
    #bg-layer {
      position: fixed;
      inset: 0;
      transition: opacity 1.8s ease;
    }
    #bg-layer.fade-out { opacity: 0; pointer-events: none; }

    .slide-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 0.08s ease;
    }
    .slide-img.active { opacity: 1; }

    /* ── Counter layer ── */
    #counter-layer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 1.8s ease;
    }
    #counter-layer.fade-out { opacity: 0; pointer-events: none; }

    #counter-wrap {
      text-align: center;
      user-select: none;
      padding: 1.5rem 2.5rem 1.2rem;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #counter-num {
      display: block;
      font-size: clamp(5rem, 26vw, 13rem);
      font-weight: bold;
      color: #fff;
      line-height: 1;
      transition: transform 0.06s ease;
    }

    #counter-label {
      display: block;
      font-size: clamp(1.4rem, 7vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #fff;
      margin-top: 0.15em;
    }

    /* ── Message layer ── */
    #message-layer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.8s ease 0.3s;
      background: #000;
      overflow-y: auto;
    }
    #message-layer.visible { opacity: 1; pointer-events: auto; }

    #message-box {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    #heart-top {
      font-size: clamp(2.5rem, 10vw, 4rem);
      display: block;
      margin-bottom: 1.2rem;
      animation: heartbeat 1.3s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15%       { transform: scale(1.22); }
      30%       { transform: scale(1); }
      45%       { transform: scale(1.14); }
      70%       { transform: scale(1); }
    }

    #message-text {
      font-size: clamp(0.95rem, 3.8vw, 1.2rem);
      line-height: 1.95;
      color: #fff;
      white-space: pre-line;
      word-break: break-word;
    }

    #heart-bottom {
      display: block;
      margin-top: 1.6rem;
      font-size: clamp(1.4rem, 6vw, 2rem);
      animation: heartbeat 1.3s ease-in-out infinite;
    }

    /* Falling petals */
    .petal {
      position: fixed;
      top: -2rem;
      opacity: 0;
      pointer-events: none;
      user-select: none;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg);      opacity: 0.85; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="bg-layer"></div>

  <div id="counter-layer">
    <div id="counter-wrap">
      <span id="counter-num">0</span>
      <span id="counter-label">Day</span>
    </div>
  </div>

  <div id="message-layer">
    <div id="message-box">
      <span id="heart-top">❤️</span>
      <p id="message-text"></p>
      <span id="heart-bottom">🌸</span>
    </div>
  </div>

  <script>
    /* ── Slideshow ── */
    const IMAGES = Array.from({ length: 20 }, (_, i) => `hinhanh/an_${String(i + 1).padStart(2, '0')}.webp`);
    const bgLayer = document.getElementById('bg-layer');

    /* build 4 img elements, stack them */
    const slides = IMAGES.map((src, i) => {
      const img = document.createElement('img');
      img.src       = src;
      img.className = 'slide-img' + (i === 0 ? ' active' : '');
      img.alt       = '';
      bgLayer.appendChild(img);
      return img;
    });

    let currentSlide = 0;
    /* 10s / 60 lần = 167ms mỗi ảnh */
    const slideInterval = setInterval(() => {
      slides[currentSlide].classList.remove('active');
      currentSlide = (currentSlide + 1) % slides.length;
      slides[currentSlide].classList.add('active');
    }, 167);

    /* ── Counter 0 → 150 in 10 s ── */
    const counterNumEl  = document.getElementById('counter-num');
    const counterLayer  = document.getElementById('counter-layer');
    const messageLayer  = document.getElementById('message-layer');
    const messageText   = document.getElementById('message-text');

    const MESSAGE =
`Chúc mừng hành trình tình yêu của bọn mình 🎉

Mình và Beo đã cùng nhau yêu nhau đến nay đã nửa năm rồi. Điều mình thấy hạnh phúc và tự hào trong mối quan hệ này là bọn mình rất trân trọng nhau.

Đây có phải là mối quan hệ lành mạnh với beo không? Với mình, đây là một điều tuyệt vời và nhẹ nhàng mà thế giới này đem đến :3

Bọn mình cùng nhau chinh phục các cột mốc tiếp theo nhe.

tui iu bạn, bạn cũm thisaaa ❤️`;

    messageText.textContent = MESSAGE;

    const COUNT_DURATION = 10000;
    const COUNT_TARGET   = 150;
    let   startTime      = null;
    let   lastDisplayed  = -1;

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function animateCounter(timestamp) {
      if (!startTime) startTime = timestamp;
      const elapsed  = timestamp - startTime;
      const progress = Math.min(elapsed / COUNT_DURATION, 1);
      const current  = Math.round(easeOutCubic(progress) * COUNT_TARGET);

      if (current !== lastDisplayed) {
        counterNumEl.textContent     = current;
        counterNumEl.style.transform = 'scale(1.08)';
        setTimeout(() => { counterNumEl.style.transform = 'scale(1)'; }, 60);
        lastDisplayed = current;
      }

      if (progress < 1) {
        requestAnimationFrame(animateCounter);
      } else {
        clearInterval(slideInterval);
        bgLayer.classList.add('fade-out');
        counterLayer.classList.add('fade-out');
        setTimeout(() => {
          messageLayer.classList.add('visible');
          spawnPetals();
        }, 2000);
      }
    }

    requestAnimationFrame(animateCounter);

    /* ── Falling petals (message screen) ── */
    const PETALS = ['🌸', '🌺', '💗', '🌹', '💕', '✨'];

    function spawnPetals() {
      for (let i = 0; i < 22; i++) {
        const el = document.createElement('span');
        el.className = 'petal';
        el.textContent             = PETALS[Math.floor(Math.random() * PETALS.length)];
        el.style.left              = Math.random() * 100 + 'vw';
        el.style.animationDuration = (4 + Math.random() * 7) + 's';
        el.style.animationDelay    = (Math.random() * 6) + 's';
        el.style.fontSize          = (0.8 + Math.random() * 1.3) + 'rem';
        document.body.appendChild(el);
      }
    }
  </script>
</body>
</html>
